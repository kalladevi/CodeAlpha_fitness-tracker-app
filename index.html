<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🏃 Fitness Tracker</h1>

    <div class="form-box">
        <input type="number" id="steps" placeholder="Steps">
        <input type="text" id="exercise" placeholder="Exercise Type">
        <input type="number" id="minutes" placeholder="Workout Minutes">
        <input type="number" id="calories" placeholder="Calories Burned">

        <button onclick="saveData()">Add Activity</button>
    </div>

    <div class="dashboard">
        <h2>Today's Summary</h2>

        <p>Steps: <span id="stepCount">0</span></p>
        <div class="progress">
            <div id="stepBar"></div>
        </div>

        <p>Workout Minutes: <span id="minuteCount">0</span></p>
        <div class="progress">
            <div id="minuteBar"></div>
        </div>

        <p>Calories Burned: <span id="calorieCount">0</span></p>
        <div class="progress">
            <div id="calorieBar"></div>
        </div>

        <h3>Activity Log</h3>
        <ul id="activityList"></ul>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
